<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Responsive styles for light/dark mode tab compatibility -->
    <style>
      :root {
        --color-gold: #C9923E;
        --color-gold-glow: rgba(201, 146, 62, 0.4);
        --color-gold-bg: rgba(201, 146, 62, 0.06);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --color-gold: #A27027;
          --color-gold-glow: rgba(162, 112, 39, 0.35);
          --color-gold-bg: rgba(162, 112, 39, 0.1);
        }
      }
      .glow-filter {
        filter: url(#glow);
      }
      .circuit-line {
        stroke: var(--color-gold);
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .circuit-node {
        fill: var(--color-gold);
      }
      .moon-body {
        fill: var(--color-gold-bg);
        stroke: var(--color-gold);
        stroke-width: 1.5;
        opacity: 0.9;
      }
    </style>

    <!-- Glowing Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Bounding Moon Mask for Clip-Path mapping -->
    <mask id="moon-mask">
      <path d="M67.5 15A35 35 0 0 0 67.5 85A45 45 0 0 1 67.5 15Z" fill="white" />
    </mask>
  </defs>

  <!-- Base Moon Silhouette (with thin outline & subtle glass-glow background) -->
  <path d="M67.5 15A35 35 0 0 0 67.5 85A45 45 0 0 1 67.5 15Z" class="moon-body glow-filter" />

  <!-- Masked Circuit Pathways Group -->
  <g mask="url(#moon-mask)" class="glow-filter">
    <!-- Main spine route -->
    <path d="M47 20 L43 35 L40 50 L43 65 L48 80" class="circuit-line" />
    
    <!-- Branch 1 (Upper inner-facing) -->
    <path d="M43 35 L47 40" class="circuit-line" />
    <circle cx="47" cy="40" r="2.2" class="circuit-node" />

    <!-- Branch 2 (Lower inner-facing) -->
    <path d="M43 65 L47 60" class="circuit-line" />
    <circle cx="47" cy="60" r="2.2" class="circuit-node" />

    <!-- Branch 3 (Top-most branch) -->
    <path d="M45 25 L42 30" class="circuit-line" />
    <circle cx="42" cy="30" r="2.2" class="circuit-node" />

    <!-- Branch 4 (Mid-outer branch) -->
    <path d="M40 50 L35 48" class="circuit-line" />
    <circle cx="35" cy="48" r="2.2" class="circuit-node" />

    <!-- Branch 5 (Bottom-most branch) -->
    <path d="M46 70 L42 73" class="circuit-line" />
    <circle cx="42" cy="73" r="2.2" class="circuit-node" />

    <!-- Additional background network trace for depth -->
    <path d="M44 28 L40 33 L38 42" class="circuit-line" style="opacity: 0.5; stroke-width: 1.2;" />
    <circle cx="38" cy="42" r="1.5" class="circuit-node" style="opacity: 0.5;" />
    
    <path d="M44 72 L40 67 L38 58" class="circuit-line" style="opacity: 0.5; stroke-width: 1.2;" />
    <circle cx="38" cy="58" r="1.5" class="circuit-node" style="opacity: 0.5;" />
  </g>
</svg>
